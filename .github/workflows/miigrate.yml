name: Run Laravel Migration and Seed to Supabase

on:
  workflow_dispatch: # Biar bisa di-klik manual dari web GitHub

jobs:
  laravel-migration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup PHP Engine
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4' # MATCH SINKRON: Di-bump ke 8.4 biar cocok sama composer.lock lu pak!
        extensions: pdo, pdo_pgsql, pgsql

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Execute Artisan Migrate & Seeder
      env:
        DB_CONNECTION: pgsql
        DB_HOST: db.maxnxsxizgyemuhstyyv.supabase.co
        DB_PORT: 5432
        DB_DATABASE: postgres
        DB_USERNAME: postgres
        DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # Tambahkan bumbu --seed di akhir perintah biar data master otomatis terisi
      run: php artisan migrate --force --seed